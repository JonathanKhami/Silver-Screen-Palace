{% extends "base.html" %}
{% block title %}Showtimes — Silver Screen Palace{% endblock %}
{% block content %}

<div class="container">
  <span class="section-label">Schedule</span>
  <h2 class="gold">Showtimes</h2>

  <div class="card">
    <h2 style="font-size: 22px; margin-bottom: 16px;">Schedule New Screening</h2>
    <div class="row">
      <div><label>Movie</label><select id="movie"></select></div>
      <div><label>Theater</label><select id="theater"></select></div>
      <div><label>Date</label><input type="date" id="date"></div>
      <div><label>Start Time</label><input type="time" id="time"></div>
      <div><button onclick="schedule()">Schedule</button></div>
    </div>
    <div id="msg"></div>
  </div>

  <h2 style="font-size: 22px; margin-top: 40px;">All Showtimes</h2>
  <div id="list">
    <div class="loading"><div class="spinner"></div><span>Loading showtimes…</span></div>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
  async function init() {
    const [movies, theaters] = await Promise.all([
      apiGet("/api/movies/active"), apiGet("/api/theaters")
    ]);
    document.getElementById("movie").innerHTML =
      movies.map(m => `<option value="${m.MOVIE_ID}">${m.MOVIE_TITLE} (${m.MOVIE_RATING})</option>`).join("");
    document.getElementById("theater").innerHTML =
      theaters.map(t => `<option value="${t.THEATER_ID}">Theater #${t.THEATER_ID} (cap ${t.THEATER_CAPACITY})</option>`).join("");
  }

  async function loadScreenings() {
    // Check for a ?movie= filter in the URL
    const params = new URLSearchParams(window.location.search);
    const movieFilter = params.get("movie");
    const url = movieFilter ? `/api/screenings?movie_id=${movieFilter}` : "/api/screenings";

    const rows = await apiGet(url);
    if (!rows.length) {
      document.getElementById("list").innerHTML =
        "<p style='color:var(--muted); padding: 20px 0;'>No showtimes scheduled.</p>";
      return;
    }
    document.getElementById("list").innerHTML = rows.map((r, i) => {
      const pct = 100 * (1 - r.SEATS_AVAILABLE / r.THEATER_CAPACITY);
      const dateStr = new Date(r.SCREENING_DATE).toLocaleDateString('en-US',
        { weekday: 'short', month: 'short', day: 'numeric' });
      return `
        <div class="showtime-card fade-in" style="animation-delay:${Math.min(i,10)*0.05}s">
          <div class="poster-sm">
            ${r.MOVIE_POSTER ? `<img src="${r.MOVIE_POSTER}" alt="${r.MOVIE_TITLE}" loading="lazy">` : ''}
          </div>
          <div class="details">
            <h3>${r.MOVIE_TITLE}</h3>
            <div class="meta">
              <span><span class="rating ${r.MOVIE_RATING==='R'?'r':''}">${r.MOVIE_RATING}</span></span>
              <span>⏱ ${r.MOVIE_RUNTIME} min</span>
              <span>📅 ${dateStr}</span>
              <span>🎫 ${fmtTime(r.SCREENING_START_TIME)}</span>
              <span>🎥 Theater #${r.THEATER_ID}</span>
            </div>
            <div class="seats">${r.SEATS_AVAILABLE} of ${r.THEATER_CAPACITY} seats available</div>
            <div class="seats-bar"><div class="fill" style="width:${pct}%"></div></div>
          </div>
        </div>`;
    }).join("");
  }

  async function schedule() {
    const body = {
      movie_id:   parseInt(document.getElementById("movie").value, 10),
      theater_id: parseInt(document.getElementById("theater").value, 10),
      date:       document.getElementById("date").value,
      start_time: document.getElementById("time").value,
    };
    if (!body.date || !body.start_time)
      return showMessage("msg", "Pick a date and time", "err");
    try {
      await apiPost("/api/screenings", body);
      showMessage("msg", "Scheduled!", "ok");
      loadScreenings();
    } catch (e) {
      showMessage("msg", e.message, "err");
    }
  }

  init().then(loadScreenings);
</script>
{% endblock %}

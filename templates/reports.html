{% extends "base.html" %}
{% block title %}Reports{% endblock %}
{% block scripts %}
<script>
    (async () => {
      // Sales by movie
      const sales = await apiGet("/api/reports/sales-by-movie");
      document.getElementById("sales").innerHTML = `
        <table>
          <tr><th>Movie</th><th>Tickets Sold</th><th>Cancelled</th><th>Revenue</th></tr>
          ${sales.map(r => `
            <tr>
              <td>${r.MOVIE_TITLE}</td>
              <td>${r.TICKETS_SOLD}</td>
              <td>${r.TICKETS_CANCELLED}</td>
              <td>$${Number(r.REVENUE).toFixed(2)}</td>
            </tr>`).join("")}
        </table>`;

      // Occupancy
      const occ = await apiGet("/api/reports/occupancy");
      document.getElementById("occ").innerHTML = `
        <table>
          <tr><th>Movie</th><th>Date</th><th>Time</th>
              <th>Seats Sold</th><th>Capacity</th><th>Occupancy</th></tr>
          ${occ.map(r => `
            <tr>
              <td>${r.MOVIE_TITLE}</td>
              <td>${r.SCREENING_DATE}</td>
              <td>${fmtTime(r.SCREENING_START_TIME)}</td>
              <td>${r.SEATS_SOLD}</td>
              <td>${r.THEATER_CAPACITY}</td>
              <td>${r.OCCUPANCY_PCT ?? 0}%</td>
            </tr>`).join("")}
        </table>`;
    })();
  </script>
{% endblock %}
{% block content %}
  <div class="card">
    <h2>Sales by Movie</h2>
    <div id="sales">Loading…</div>
  </div>

  <div class="card">
    <h2>Screening Occupancy</h2>
    <div id="occ">Loading…</div>
  </div>

  {% endblock %}
